---
# harden_ssh.yml
# Disables root SSH login and password-based SSH authentication,
# then restarts sshd if any change was made.

- name: Harden SSH configuration
  hosts: all
  become: true

  vars:
    sshd_config_path: /etc/ssh/sshd_config

  tasks:

    - name: Ensure PermitRootLogin is disabled
      ansible.builtin.lineinfile:
        path: "{{ sshd_config_path }}"
        regexp: '^\s*#?\s*PermitRootLogin\s+.*'
        line: 'PermitRootLogin no'
        state: present
        backup: true
        validate: '/usr/sbin/sshd -t -f %s'
      notify: Restart sshd

    - name: Ensure PasswordAuthentication is disabled
      ansible.builtin.lineinfile:
        path: "{{ sshd_config_path }}"
        regexp: '^\s*#?\s*PasswordAuthentication\s+.*'
        line: 'PasswordAuthentication no'
        state: present
        backup: true
        validate: '/usr/sbin/sshd -t -f %s'
      notify: Restart sshd

    - name: Ensure ChallengeResponseAuthentication/KbdInteractiveAuthentication is disabled
      ansible.builtin.lineinfile:
        path: "{{ sshd_config_path }}"
        regexp: '^\s*#?\s*(ChallengeResponseAuthentication|KbdInteractiveAuthentication)\s+.*'
        line: 'KbdInteractiveAuthentication no'
        state: present
        backup: true
        validate: '/usr/sbin/sshd -t -f %s'
      notify: Restart sshd

    - name: Check for any additional sshd_config.d drop-in files that could override settings
      ansible.builtin.find:
        paths: /etc/ssh/sshd_config.d
        patterns: '*.conf'
      register: sshd_dropins
      changed_when: false
      failed_when: false

    - name: Warn if drop-in files exist that might override these settings
      ansible.builtin.debug:
        msg: >
          Warning: files found in /etc/ssh/sshd_config.d/ may override
          PermitRootLogin/PasswordAuthentication depending on Include order.
          Review: {{ sshd_dropins.files | map(attribute='path') | list }}
      when: sshd_dropins.matched is defined and sshd_dropins.matched > 0

  handlers:
    - name: Restart sshd
      ansible.builtin.service:
        name: "{{ 'ssh' if ansible_facts['os_family'] == 'Debian' else 'sshd' }}"
        state: restarted
